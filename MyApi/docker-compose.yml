version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: myapi-postgres
    environment:
      POSTGRES_DB: MyApiDb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts:/docker-entrypoint-initdb.d
    restart: unless-stopped

volumes:
  postgres_data: